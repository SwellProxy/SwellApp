<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:100%;pointer-events:none;font-family:-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC',sans-serif;">
  <div style="position:absolute;left:16px;right:16px;bottom:14px;height:60px;border-radius:32px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.14);">
    <div style="position:absolute;inset:0;backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);background:{{barBg}};"></div>
    <div style="position:absolute;inset:0;border-radius:32px;box-shadow:{{barShine}};border:{{barBorder}};pointer-events:none;"></div>
    <div style="position:relative;display:flex;height:100%;">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3v8" stroke="{{cCon}}" stroke-width="2" stroke-linecap="round"></path><path d="M7.4 5.9a7.4 7.4 0 1 0 9.2 0" stroke="{{cCon}}" stroke-width="2" stroke-linecap="round"></path></svg>
        <span style="font-size:10.5px;font-weight:600;color:{{cCon}};">连接</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.4" stroke="{{cNode}}" stroke-width="1.9"></circle><ellipse cx="12" cy="12" rx="3.7" ry="8.4" stroke="{{cNode}}" stroke-width="1.5"></ellipse><path d="M3.8 12h16.4" stroke="{{cNode}}" stroke-width="1.5"></path></svg>
        <span style="font-size:10.5px;font-weight:600;color:{{cNode}};">节点</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 21v-9.5" stroke="{{cRoute}}" stroke-width="1.9" stroke-linecap="round"></path><path d="M12 11.5C12 7.8 7.3 8.8 7.3 5.2" stroke="{{cRoute}}" stroke-width="1.9" stroke-linecap="round"></path><path d="M12 11.5c0-3.7 4.7-2.7 4.7-6.3" stroke="{{cRoute}}" stroke-width="1.9" stroke-linecap="round"></path><path d="M5.4 7l1.9-2 1.9 2" stroke="{{cRoute}}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path><path d="M14.8 7l1.9-2 1.9 2" stroke="{{cRoute}}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <span style="font-size:10.5px;font-weight:600;color:{{cRoute}};">分流</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19.4 13c.04-.32.06-.65.06-1s-.02-.68-.06-1l2.1-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.73-1l-.38-2.65A.5.5 0 0 0 13.93 2h-4a.5.5 0 0 0-.5.42l-.38 2.65c-.62.26-1.2.6-1.73 1l-2.48-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64L4.55 11c-.04.32-.06.65-.06 1s.02.68.06 1l-2.1 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.22.39.31.6.22l2.49-1c.53.4 1.11.74 1.73 1l.38 2.65a.5.5 0 0 0 .5.42h4a.5.5 0 0 0 .5-.42l.38-2.65a7.3 7.3 0 0 0 1.73-1l2.48 1c.22.09.48 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64L19.4 13zM11.93 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z" fill="{{cSet}}"></path></svg>
        <span style="font-size:10.5px;font-weight:600;color:{{cSet}};">设置</span>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:393,&quot;height&quot;:110},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;connect&quot;,&quot;nodes&quot;,&quot;route&quot;,&quot;settings&quot;],&quot;default&quot;:&quot;connect&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active ?? 'connect', dark = !!this.props.dark;
    const on = '#00C7BE', off = dark ? 'rgba(235,235,245,0.55)' : '#93939B';
    const c = (k) => (a === k ? on : off);
    return {
      cCon: c('connect'), cNode: c('nodes'), cRoute: c('route'), cSet: c('settings'),
      barBg: dark ? 'rgba(28,28,30,0.72)' : 'rgba(252,252,253,0.78)',
      barShine: dark ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.10)' : 'inset 1.5px 1.5px 1.5px rgba(255,255,255,0.85), inset -1px -1px 1px rgba(255,255,255,0.4)',
      barBorder: dark ? '0.5px solid rgba(255,255,255,0.12)' : '0.5px solid rgba(0,0,0,0.05)'
    };
  }
}
</script>
</body>
</html>
